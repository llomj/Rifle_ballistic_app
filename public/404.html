<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifle Ballistic App</title>
    <script>
        // Redirect to app base for GitHub Pages (e.g. /rifle_ballistic_app/)
        const seg = location.pathname.split('/').filter(Boolean)[0];
        const basePath = '/' + (seg || 'rifle_ballistic_app') + '/';
        const path = window.location.pathname;
        if (path !== basePath && path !== basePath.replace(/\/$/, '')) {
            window.location.replace(basePath);
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
